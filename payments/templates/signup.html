<!DOCTYPE html>
<html>
<head>
<title>Signup - PlayTo</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    display: flex;
    width: 800px;
    height: 500px;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.25);
}

/* LEFT */
.left {
    width: 45%;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    color: white;
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.left h2 {
    font-size: 28px;
}

.left p {
    font-size: 14px;
    opacity: 0.9;
}

/* RIGHT */
.right {
    width: 55%;
    padding: 50px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.title {
    font-size: 24px;
    margin-bottom: 25px;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

input:focus {
    border-color: #2874f0;
    box-shadow: 0 0 5px rgba(40,116,240,0.4);
    outline: none;
}

button {
    background: #28a745;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #218838;
}

.error {
    color: red;
    font-size: 13px;
    margin-bottom: 10px;
}

.link {
    margin-top: 15px;
    font-size: 14px;
}

.link a {
    color: #2874f0;
    text-decoration: none;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <h2>Join PlayTo</h2>
        <p>Create your account and start managing your wallet like a pro.</p>
    </div>

    <!-- RIGHT -->
    <div class="right">

        <div class="title">Sign Up</div>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Create Account</button>
        </form>

        <div class="link">
            Already have account? <a href="/login/">Login</a>
        </div>

    </div>

</div>

</body>
</html>
