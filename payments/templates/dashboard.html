<!DOCTYPE html>
<html>
<head>
<title>PlayTo Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: white;
}

.header {
    background: linear-gradient(90deg, #2563eb, #7c3aed);
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.container {
    padding: 20px;
    max-width: 1100px;
    margin: auto;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 15px;
}

input {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 8px;
}

#successPopup {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
    font-size:28px;
}
</style>
</head>

<body>

<div id="successPopup">✅ Payment Successful!</div>

<div class="header">
    <div>💳 Dashboard</div>
    <div>
        {{ request.user.username }}
        <form method="POST" action="/logout/" style="display:inline;">
            {% csrf_token %}
            <button>Logout</button>
        </form>
    </div>
</div>

<div class="container">

<div class="card">
<h2 id="balance">₹0</h2>
</div>

<div class="card">
<input id="amount" placeholder="Amount">
<button onclick="payNow()">Pay & Add Money</button>
</div>

<div class="card">
<input id="payout_amount" placeholder="Amount">
<input id="account" placeholder="Account Number">
<input id="ifsc" placeholder="IFSC">
<input id="name" placeholder="Name">
<button onclick="requestPayout()">Withdraw</button>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<table id="txnTable"></table>
</div>

</div>

<script>
function getCSRFToken(){
    return document.cookie.split('; ')
    .find(row => row.startsWith('csrftoken'))
    ?.split('=')[1];
}

function showSuccessAnimation(){
    let p=document.getElementById("successPopup");
    p.style.display="flex";
    setTimeout(()=>{p.style.display="none"},2000);
}

function payNow(){
    let amount=document.getElementById("amount").value;

    fetch(`/api/create-order/?amount=${amount}`)
    .then(res=>res.json())
    .then(order=>{
        var options={
            key:"rzp_test_Sinc7UPMKWMqp5",
            amount:order.amount,
            order_id:order.id,
            handler:function(){
                showSuccessAnimation();
                creditMoney();
            }
        };
        new Razorpay(options).open();
    });
}

function creditMoney(){
    fetch('/api/credit/',{
        method:'POST',
        headers:{
            'Content-Type':'application/json',
            'X-CSRFToken':getCSRFToken()
        },
        body:JSON.stringify({
            amount:document.getElementById("amount").value
        })
    }).then(()=>{loadAll();});
}

function requestPayout(){
    fetch('/api/payout/',{
        method:'POST',
        headers:{
            'Content-Type':'application/json',
            'X-CSRFToken':getCSRFToken()
        },
        body:JSON.stringify({
            amount:document.getElementById("payout_amount").value,
            account_number:document.getElementById("account").value,
            ifsc:document.getElementById("ifsc").value,
            name:document.getElementById("name").value
        })
    }).then(()=>{loadAll();});
}

function loadAll(){
    fetch('/api/balance/')
    .then(res=>res.json())
    .then(data=>{
        document.getElementById("balance").innerText="₹"+data.balance;
    });

    fetch('/api/transactions/')
    .then(res=>res.json())
    .then(data=>{
        let table=document.getElementById("txnTable");
        table.innerHTML="";
        let credit=0,debit=0;

        data.transactions.forEach(t=>{
            table.innerHTML+=`<tr>
            <td>${t.type}</td>
            <td>${t.amount}</td>
            <td>${t.status}</td></tr>`;

            if(t.type==="credit") credit+=t.amount;
            else debit+=t.amount;
        });

        new Chart(document.getElementById("chart"),{
            type:'bar',
            data:{
                labels:["Credit","Debit"],
                datasets:[{data:[credit,debit]}]
            }
        });
    });
}

window.onload=loadAll;
</script>

</body>
</html>
